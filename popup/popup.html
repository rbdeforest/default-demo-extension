<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Default Demo</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <div class="logo-dot"></div>
      <h1>Default Demo</h1>
    </div>

    <div class="status" id="status">form detector loaded</div>

    <div class="forms" id="forms">
      <div class="empty">No forms detected yet.</div>
    </div>

    <button class="primary" id="open-trace" disabled>Open trace panel</button>
    <button class="secondary" id="run-sandbox">Run demo without a form</button>
    <button class="secondary" id="pick-fields">Pick form fields</button>
    <button class="ghost" id="clear-picks">Clear saved picks</button>

    <div class="footer">
      <label class="picker">
        Workflow
        <select id="workflow-picker">
          <option value="placeholder">Placeholder Demo Workflow</option>
        </select>
      </label>

      <label class="toggle">
        <input type="checkbox" id="auto-open-toggle" checked />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-label">
          Show overlay
          <span class="toggle-help">Off: still blocks the form, no overlay or marker</span>
        </span>
      </label>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
